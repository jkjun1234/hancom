<!DOCTYPE html> <!-- html 문서 정의 -->
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>이미지 태그에 대해</title>
    </head>
    <body>
        <h1>이미지 태그 (img)에 대해</h1>
        <!-- 
            img태그 의 속성
            src : 표시할 이미지의 링크
            alt :  표시될 이미지가 보이지 않을시 표시할 내용
            무료 이미지 중 https://www.pexels.com/ko-kr/ 를 사용하면 좋다.
        -->

        <!-- 웹 링크를 통한 이미지 -->
        <img src="https://picsum.photos/600/400" alt="예시 사진"/>  

        <!-- 로컬 경로를 이용한 이미지 -->
         <img src="../Img/pexels-k3ithvision-29423548.jpg" alt="pexles에서 받은 이미지"/>

    </body>
</html>
