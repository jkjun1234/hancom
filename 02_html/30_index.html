<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>음성 넣기</title>
    </head>
    <body>
        <h1>음성 태그</h1>

        <!-- controls 속성을 통해 웹에서 제어 할 수 있도록 설정 -->
        <audio controls autoplay loop>
            <!-- 소스 태그
                음성 소스 얻어오는 법 
                1. 파파고 접속
                2. 아무 단어 번역
                3. F12 > 네트워크 창 열기
                4. 발음 재생 
                5. c_It_으로 시작하는 파일 클릭 > Request URL 복사
                6. 웹브라우저에 해당 복사내용 붙여넣기
                7. 해당 오디오 파일 다운로드
            -->
            <source  src= "../02_html/Audio/audio.mp4">
        </audio>
    </body>
</html>
