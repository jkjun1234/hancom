<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>접기</title>
    </head>
    <body>
        <h1>접기 태그</h1>
        <p><strong>details:</strong> 요소를 접는 태그로 아래 처럼 details 태그 내부의 내용을 접었다 펼수 있다.</p>
        <!-- details : 요소를 접을 수 있는 태그 -->
        <details>
            <summary>정답 보기</summary>
            <p>
                정답은 눌러야 보입니다.
            </p>
        </details>
    </body>
</html>
