<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 반응형 웹에서 사용할 수 있도록 하는 기본적인 뼈대 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이번 시간엔 단축명령어로 코드를 빠르게 생성하는 법을 알아본다.</h1>
    <!-- ul>li*N ul리스트의 항목을 몇 개(N)를 생성-->
     <ul>
        <li></li>
        <li></li>
        <li></li>
     </ul>
     <div class="box"></div>
     <div id="top"></div>
     <h1>안녕하세요</h1>
     <p>이것도 되네 신기하다</p>
     <a href="#"></a>
</body>
</html>

<!-- 
• > — 안에 넣기(자식). ul>li = ul 안에 li
• *N — N번 반복. li*3 = li 3개
• .이름 — class 붙이기. .box = class="box"
• #이름 — id 붙이기. #top = id="top"
• {글자} — 태그 안의 내용. h1{안녕} = <h1>안녕</h1>
• [속성] — 속성 넣기. a[href=#] = href="#"
-->
