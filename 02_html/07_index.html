<!DOCTYPE html>
<!-- 언어 설정 -->
<html lang="ko">
    <head>
        <!-- 문자 설정 해당 포맷을 사용하여 한글이 깨지지 않도록 지원 -->
        <meta charset="UTF-8">
        <title>강조,중첩에 대하여</title>
    </head>
    <body>
        <h1>강조, 중첩</h1>
        <!-- strong 태그는 해당 텍스트를 강조할 수 있다. -->
         <!-- 태그 내부에 다른 태그를 중첩하여 사용가능 -->
        <p>저는 <strong>개발</strong>하는 것을 좋아합니다! &lt;, < </p>
    </body>
</html>

<!-- 
<, >, & 은 html 이 명령어로 착가하게되는데 
그럴 경우 아래 기호(엔티티)를 통해 표시
• &lt → <
• &gt → >
• &amp → &
-->
