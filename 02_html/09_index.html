<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset = "UTF-8">
        <title>링크 넣는 태그</title>
    </head>
    <body>
        <h1>링크 태그에 대하여</h1>

        <!-- a 태그는 해당 주소(href)위치로 페이지를 이동하기 위한 태그 -->
        <a href="https://www.naver.com/">네이버</a> <br>    <!-- br 태그는 해당 태그 내용 이후 줄바꿈을 적용-->
        <a href="https://www.google.com">구글</a> <br>
        <a href="https://hancom.com">한컴</a>
    </body>
</html>
<!--
1. target (링크가 열릴 위치 지정)
링크를 클릭했을 때 새 창에서 열지, 현재 창에서 열지 결정합니다.

<a href="https://example.com" target="_blank">새 창에서 열기</a>

_self: 현재 창에서 링크를 엽니다. (기본값)

_blank: 새 탭이나 새 창에서 링크를 엽니다.

_parent: 부모 프레임에서 링크를 엽니다.

_top: 최상위 프레임에서 링크를 엽니다. (프레임 구조를 벗어날 때 사용)
-->
