<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>글자 꾸미기</title>
    </head>
    <body>
        <h1>글자 꾸미는 법</h1>
        <p><em><strong>em 태그내부</strong> : 기울임 강조</em></p>
        <p><mark><strong>mark 태그 내부</strong> : 문장 형광표시</mark></p>
        <p><small><strong>small 태그 내부</strong> : 작은 글씨</small></p>

        <!-- blockquote : 글자 인용을 표현하는데 사용될 태그 -->
        <blockquote>글자 인용</blockquote>
        <!-- sub : 글자 우측하단 작게 표기하는 태그 -->
        <p>H<sub>2</sub>0</p>
        <p>X<sub>2</sub></p>
        <p>일<sub>이</sub>삼</p>
    </body>
</html>
