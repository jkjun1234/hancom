<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            영상 표현 태그 
        </title>
    </head>

    <body>
        <!-- 웹에 표시될 부분 -->
         <h1>영상 태그</h1>
         <p>이전엔 iframe 태그를 활용하여 영상을 사용했지만 이번엔 video태그를 이용해 영상을 표현해본다.</p>

         <!-- video : 영상을 표현하는 태그로 controls 속성값을 통해 제어 할 수 있다. -->
         <video controls src="../Img/영상.mp4" width="600px" height="600px"></video>
    </body>
</html>
