<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>표</title>
    </head>
    <body>
        <h1>표 태그에 대하여</h1>
        <table border="1">  <!-- table 의 속성 border : 표의 선 크기-->
            <!-- tr : 가로 한줄, th : 제목 칸(굵은 글씨표시) -->
            <tr>
                <th>요일</th>
                <th>내용</th>
                <th>시간</th>
                <th>배운 내용</th>
            </tr> 
            <!-- td : 내용 칸 -->
            <tr>
                <td>월</td>
                <td>HTML</td>
                <td>7h</td>
                <td>VSCode 설정, HTML 기본 양식 및 요소 학습</td>
            </tr>
            <tr>
                <td>화</td>
                <td>HTML</td>
                <td>7h</td>
                <td>HTML 태그 실습(번호있는 리스트, 줄 표시, 테이블 태그)</td>
            </tr>
            <tr>
                <td>수</td>
                <td>HTML</td>
                <td>7h</td>
            </tr>
        </table>
    </body>
</html>
