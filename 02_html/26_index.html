<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>표 합치기</title>
    </head>
    <body>
        <h1>표 합치기</h1>
        <table border="1">
            <thead>
                <tr>
                    <th colspan="3">    <!-- colspan : 3 td(열) 너비를 하나로 합침-->
                        성적표 
                    </th>
                </tr>
            </thead>    
            <tbody>
                <!-- rowspan : 아래 3 tr(행)을 합치도록 설정 -->
                <tr><td rowspan="3">과목</td> <td>영어</td> <td>90</td></tr>
                <tr> <td rowspan="1">국어</td> <td>93</td></tr>
                <tr> <td>수학</td> <td>88</td></tr>
            </tbody>
        </table>
    </body>
</html>
