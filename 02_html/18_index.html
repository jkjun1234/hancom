<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>class</title>
    </head>
    <body>
        <h1>Class에 대하여</h1>
        <!-- class : css에서 해당 요소로 접근하기 위해 사용가능한 속성값 -->
        <!-- class는 여러 요소에서 동일한 값을 적용가능하다. -->
        <p class="text" class="text2">이것은 테스트용</p>
        <p class="text">이것도 테스트용</p>
    </body>
</html>
