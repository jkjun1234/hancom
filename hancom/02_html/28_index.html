<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시맨틱 구조</title>
    </head>
    <body>
        <h1>시맨틱 구조에 대하여</h1>
        <header>
            <nav>홈 | 소개 | 연락처</nav>
        </header>
        <main>
            <section>
                <!-- 완결된 글 하나 -->
                <article>
                    첫번째 글 내용
                </article>
            </section>
        </main>
        <!-- 옆에서 볼수 있는 사이드 바 -->
        <aside>
            곁다리 정보(사이드바)
        </aside>
        <footer>
            2026 내 사이트
        </footer>
    </body>
</html>

<!-- 
    div는 뜻 없는 빈 상자
    시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남 
    핵심 : header, nav, main, section, article, aside, footer
-->
