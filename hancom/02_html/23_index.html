<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            링크 심화
        </title>
    </head>
    <!-- body와 footer 요소에 id 속성을 추가하여 원하는 위치에  태그가 이동하도록 a 태그를 사용할 예정-->
    <body id="top">
        <h1>링크 태그 심화</h1>
        <!-- target 속성  -->
         <!-- _blank : 새탭에서 열기 -->
        <a href="https://www.google.com" target="_blank">Google</a>

        <!-- 메일 전송가능한 링크 열기 -->
        <a href="mailto:jkjun1234@gmail.com" target="_blank">mali</a>
        <a href="tel:01012345678" target="_blank">tel</a>

        <!-- id를 통해 해당 요소가 있는 위치로 이동 -->
        <a href="#bottom">맨 아래로</a>
        <img src="/Img/골목풍경.jpg" alt="">
        <a href="#top">맨 위로</a>

        <footer id="bottom">여기는 맨 아래</footer>
    </body>
</html>
