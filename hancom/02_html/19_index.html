<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>id</title>
    </head>
    <body>
        <h1>id 에 대하여</h1>
        <!-- css에서 해당 id나 class 값을 사용해서 디자인 가능 -->
        <!-- css에서 id는 #으로 접근, class 는 .으로 접근 -->
        <!-- id는 JS에서도 접근하는데 사용할 수 있다 -->
        <!-- id는 class와 다르게 id값이 중복될 수 없다 -->
        <p id="top">id란?</p>
        <p id="top">id는 중복이 안됨</p>
    </body>
</html>
