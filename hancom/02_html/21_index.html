<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>span</title>
    </head>
    <body>
        <h1>span 태그에 대하여</h1>
        <!-- span : 인라인 상자로 div와 다르게 줄바꾸지 않고 줄을 이어간다. -->
         <!-- class 를 통해 같은 라인의 내용을 강조하는데 사용가능 -->
          <!-- div와 같이 아무런 역할을 하지 않는다. -->
        <p><span class="test">여기는 스팬태그 내부</span> 여기는 스팬 태그 외부</p>
        
        택배 상자에 비유 — 겉에 "주방용품"이라 적힌 상자(시맨틱)가 라벨 없는 민무늬 상자(div)보다 나중에 찾기 쉬움 — 사람도, 검색엔진·화면낭독기도 구조를 바로 알아봄

        고르는 순서
        ① 뜻에 맞는 시맨틱 상자가 있나? (header·main·footer — STEP 10) → 있으면 그걸
        ② 마땅한 게 없고 그냥 묶기만 하면 됨 → 한 줄 통째면 div, 글자 일부면 span
    </body>
</html>
