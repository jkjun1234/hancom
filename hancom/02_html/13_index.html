<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>줄, 선</title>
    </head>
    <body>
        <!-- br = 한 문단 안에서 줄 바꾸기 (닫는 태그 없는 빈 요소) -->
        <p>첫번째 줄</p><br>
        <!-- hr = 내용을 나누는 가로 줄 (닫는 태그 없는 빈 요소) -->
        <p>두번째 줄</p><hr>
    </body>
</html>
