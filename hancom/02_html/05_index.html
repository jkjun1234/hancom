<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 
        헤드에서 글자 포맷 설정 
        title 태그를 통한 탭에 표시될 내용 적용
    -->
    <meta charset="UTF-8">
    <title>html 실습 5</title>
</head>
<body>
    <h1>바디 태그의 첫번째 제목</h1>
    <p>본 내용의 길이가 길어 에디터 상에서 잘려서 보이는 경우엔 어떻게 표시하면 좋을지에 대해 알아보도록 하자 하하하하하</p>
    <p>Alt + Z 를 입력하면 줄 바꿈이 에디터의 크기에 맞게 재정렬된다.</p>
</body>
</html>

<!-- 
- 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 안 가림 (H1 = h1)  
-->
