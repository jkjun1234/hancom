<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>지도</title>
    </head>
    <body>
        <h1>지도 추가 해보기</h1>

        <!-- 영상과 마찬가지로 iframe 태그를 활용한다 -->
        <!-- 구글 맵 -> 원하는 장소 검색 -> 공유 -> 지도 퍼가기 -> html 복사 -->
        <h2>구글 맵</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m5!3m3!1m2!1s0x357b586daa7701d7%3A0xb8e80c962220b476!2z7I2o67iM7Juo7J20IO2MkOq1kOyXreygkA!5e0!3m2!1sko!2skr!4v1782786672857!5m2!1sko!2skr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        <hr>
        <h2>카카오 맵</h2>
 <!-- * 카카오맵 - 지도퍼가기 -->
<!-- 1. 지도 노드 -->
<div id="daumRoughmapContainer1782786802149" class="root_daum_roughmap root_daum_roughmap_landing"></div>

<!--
	2. 설치 스크립트
	* 지도 퍼가기 서비스를 2개 이상 넣을 경우, 설치 스크립트는 하나만 삽입합니다.
-->
<script charset="UTF-8" class="daum_roughmap_loader_script" src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>

<!-- 3. 실행 스크립트 -->
<script charset="UTF-8">
	new daum.roughmap.Lander({
		"timestamp" : "1782786802149",
		"key" : "qzuf5fh7ues",
		"mapWidth" : "640",
		"mapHeight" : "360"
	}).render();
</script>
    </body>
</html>
