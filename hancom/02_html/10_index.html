<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>목록,시맨틱</title>
    </head>
    <body>
        <h1>목록, 시맨틱 태그에 대하여</h1>

        <!-- 페이지 맨 위 구역 -->
        <header>
            맨 위 (로고, 제목)
        </header>

        <!-- 페이지 핵심 내용 구역 -->
        <main>
            <!-- 번호가 없는 리스트 태그(ul) -->
            <ul>
                <li>좋아 하는 것 : 맛집</li>
                <li>취미 : 게임</li>
                <li>목표 : 웹 개발자</li>
                <li>좋아 하는 음식 : 일식</li>
            </ul>
        </main>

        <!-- 맨 아래 표시될 내용 (출처, 연락처 표시) -->
        <footer>
            맨 아래 (출처, 연락처 표시)
        </footer>
    </body>
</html>
