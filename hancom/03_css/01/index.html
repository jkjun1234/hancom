<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <title>css 선택자</title>
</head>
<body>
    <h1>CSS 첫걸음</h1>
    <p>모든 p는 초록</p>
    <p class="special">해당 줄만 주황색</p>
    <p id="test">해당 줄은 id를 사용</p>
    <p class="special" id="test">해당 줄은 id, special를 사용</p>
    <ul>
        <li>사과</li>
        <li><em>바나나</em>는 보라색</li>
    </ul>
</body>
</html>
